{% extends "base.html" %} {% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6">
  {% for event in events %}
  <a
    href="{% url 'event_detail' pk=event.pk %}"
    class="rounded-md border border-gray-300 p-4 shadow-sm sm:p-6 text-black hover:text-white hover:bg-red-600 transition"
  >
    <div class="sm:flex sm:justify-between sm:gap-4 lg:gap-6">
      <div class="mt-4 sm:mt-0">
        <h3 class="text-lg text-pretty font-extrabold">{{ event.name }}</h3>

        <p class="mt-4 line-clamp-2 text-sm text-pretty">
          {{ event.location }}
        </p>
      </div>
    </div>

    <dl class="mt-6 flex gap-4 lg:gap-6">
      <div class="flex items-center gap-2">
        <dt>
          <span class="sr-only"> Date </span>

          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"
            ></path>
          </svg>
        </dt>

        <dd class="text-xs">{{ event.date }}</dd>
      </div>
    </dl>
  </a>
  {% endfor %}
  <a
    href="/accreditatie/events/new"
    class="rounded-md border border-gray-300 p-4 shadow-sm sm:p-6 text-gray-300 hover:text-white hover:bg-red-600 transition"
  >
    <div class="flex justify-around items-center h-full">
      <h3 class="text-3xl text-pretty font-extrabold">Nieuw event</h3>
    </div>
  </a>
</div>
{% endblock %}
