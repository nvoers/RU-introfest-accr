{% extends "base.html" %} {% comment %}
<h2>Log In</h2>
<form method="post">
  {% csrf_token %} {{ form }}
  <button type="submit">Log In</button>
</form>
{% endcomment %} {% block content %}
<div class="flex min-h-full flex-col justify-center px-6 py-8">
  <div class="sm:mx-auto sm:w-full">
    <h1
      class="text-center text-6xl font-bold tracking-tight text-gray-900 dark:text-white"
    >
      IN.T.R.O.
    </h1>
    <h2
      class="mt-2 text-center text-xl font-bold tracking-tight text-gray-900 dark:text-white"
    >
      Inschrijving, Toegang & Registratie Organisatie
    </h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form action="#" method="POST" class="space-y-6">
      {% csrf_token %}
      <div>
        <label
          for="username"
          class="block text-sm/6 font-medium text-gray-900 dark:text-gray-100"
          >Username</label
        >
        <div class="mt-2">
          <input
            id="username"
            type="text"
            name="username"
            required
            autocomplete="username"
            class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-red-600 sm:text-sm/6"
          />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label
            for="password"
            class="block text-sm/6 font-medium text-gray-900 dark:text-gray-100"
            >Password</label
          >
        </div>
        <div class="mt-2">
          <input
            id="password"
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-red-600 sm:text-sm/6"
          />
        </div>
      </div>

      <div>
        <button
          type="submit"
          class="flex w-full justify-center rounded-md bg-red-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-red-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-600"
        >
          Sign in
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
