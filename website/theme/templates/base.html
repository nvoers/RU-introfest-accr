{% load static tailwind_tags %}
<!doctype html>
<html
  lang="en"
  class="h-full bg-white dark:bg-gray-900"
>
  <head>
    <title>Django Tailwind</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />
    {% tailwind_css %}
  </head>

  {% if user.is_authenticated %} {% block header%}
  <header class="bg-white">
    <div
      class="mx-auto flex h-16 max-w-7xl items-center gap-8 px-4 sm:px-6 lg:px-8"
    >
      <div class="flex flex-1 items-center justify-end md:justify-between">
        <nav
          aria-label="Global"
          class="hidden md:block"
        >
          <ul class="flex items-center gap-6 text-sm">
            <li>
              <a
                class="text-gray-500 transition hover:text-gray-500/75"
                href="/"
              >
                Events
              </a>
            </li>
          </ul>
        </nav>

        <div class="flex items-center gap-4">
          <div class="sm:flex sm:gap-4">
            <a
              href="/admin"
              class="block rounded-md bg-red-600 px-5 py-2.5 text-sm font-medium text-white transition hover:bg-red-700"
            >
              Admin
            </a>
          </div>
          <div class="sm:flex sm:gap-4">
            <form
              method="post"
              action="{% url 'logout' %}"
            >
              {% csrf_token %}
              <button
                type="submit"
                class="block rounded-md bg-red-600 px-5 py-2.5 text-sm font-medium text-white transition hover:bg-red-700"
              >
                Logout
              </button>
            </form>
          </div>

          <button
            class="block rounded-sm bg-gray-100 p-2.5 text-gray-600 transition hover:text-gray-600/75 md:hidden"
          >
            <span class="sr-only">Toggle menu</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="size-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>
  {% endblock %} {% endif %}
  <body class="bg-gray-50 text-black min-h-full py-auto">
    <div class="mx-auto w-2/3">{% block content %}{% endblock %}</div>
  </body>
</html>
